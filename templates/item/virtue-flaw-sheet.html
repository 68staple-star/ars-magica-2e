<form class="arm2e-item-sheet" autocomplete="off">
  <header class="arm2e-item-header">
    <img src="{{item.img}}" data-edit="img" height="48" width="48" />
    <input name="name" type="text" value="{{item.name}}" placeholder="Virtue or Flaw" />
  </header>
  <div class="arm2e-item-grid">
    <label>Kind
      <select name="system.kind">
        {{#select system.kind}}
        <option value="virtue">Virtue</option>
        <option value="flaw">Flaw</option>
        {{/select}}
      </select>
    </label>
    <label>Points <input type="number" name="system.points" value="{{system.points}}" data-dtype="Number" min="0" /></label>
    <label>Category <input type="text" name="system.category" value="{{system.category}}" /></label>
    <label>Source <input type="text" name="system.source" value="{{system.source}}" placeholder="Core, Covenants, ..." /></label>
    <label class="arm2e-span-2">Description <textarea name="system.description" rows="4">{{system.description}}</textarea></label>
  </div>
</form>
